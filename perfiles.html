<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caralibro | Perfiles</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        /* Customizar colores del Perfil */
        :root {
            --profile-bg: var(--white);
            --profile-accent: var(--fb-blue);
            --profile-accent-hover: #29487d;
            --profile-card-bg: var(--white);
            --profile-text: var(--fb-text-black);
            --profile-link: var(--fb-link-blue);
            /* imagen de fondo del perfil en caso de que se quiera */
            --profile-bg-img: url('');
        }

        .profile-header {
            display: flex;
            gap: 20px;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .profile-photo-container {
            width: 100%;
            aspect-ratio: 1/1;
            background-color: white;
            border: 1px solid #dddfe2;
            padding: 4px;
            border-radius: 2px;
            margin-bottom: 15px;
            z-index: 10;
        }

        .profile-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 2px;
        }

        .profile-header-info {
            margin-bottom: 20px;
        }

        .profile-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
        }

        .profile-name {
            font-size: 24px;
            color: #1c1e21;
            margin-bottom: 5px;
        }

        .profile-bio {
            color: #606770;
            font-style: italic;
        }

        .profile-nav {
            background-color: white;
            border-bottom: 1px solid #dddfe2;
            padding: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .profile-nav a {
            padding: 10px 15px;
            font-weight: bold;
            color: #385898;
            border-left: 1px solid #e9ebee;
        }

        .profile-nav a.active {
            color: #4b4f56;
            background-color: #f5f6f7;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .info-section {
            margin-bottom: 20px;
        }

        .info-section h3 {
            border-bottom: 1px solid #dddfe2;
            padding-bottom: 5px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #4b4f56;
        }

        .skill-tag {
            display: inline-block;
            background-color: #f0f2f5;
            padding: 4px 8px;
            border-radius: 2px;
            margin: 0 5px 5px 0;
            font-size: 11px;
            border: 1px solid #dddfe2;
        }

        .movie-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .movie-thumb {
            width: 50px;
            height: 75px;
            background-color: #ccc;
        }

        .music-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background-color: #f0f2f5;
            padding: 8px;
            border-radius: 2px;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

            <nav>
